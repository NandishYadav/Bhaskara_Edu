<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Single Page App</title>
    <script>
        // Store the redirect path in session storage so we can access it later
        var pathSegments = location.pathname.split('/').filter(Boolean);
        // If the path contains non-root segments, redirect to the app with the path
        if (pathSegments.length > 1 && pathSegments[0] === 'Bhaskara_Edu') {
            sessionStorage.redirect = location.href;
        } else if (location.pathname !== '/Bhaskara_Edu/') {
            sessionStorage.redirect = location.href;
        }
    </script>
    <meta http-equiv="refresh" content="0;URL='/Bhaskara_Edu/'">
</head>
<body>
</body>
</html>
